<!DOCTYPE html>
<html>
<head>
  <title>Luminverse 🌌</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #E6E6FA, #D8BFD8, #C3B1E1);
      color: #4B0082;
      text-align: center;
    }

    .container {
      margin-top: 120px;
    }

    h1 {
      font-size: 55px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(93, 63, 211, 0.5);
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      border-radius: 25px;
      background-color: #9370DB;
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #7B68EE;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 150px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome to Luminverse 🌌</h1>
    <p>Your space of calm, creativity, and glow ✨</p>

    <a href="https://www.youtube.com/@Bangtasticpurpleocean" class="btn">YouTube 🎥</a>
    <a href="https://www.instagram.com/btsaryana/" class="btn">Instagram 💜</a>
  </div>

  <div class="footer">
    Made with 💜 by Luminverse
  </div>
</body>
</html>
